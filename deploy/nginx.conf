# Jammy — nginx site config
# Place at /etc/nginx/sites-available/jammy and symlink to sites-enabled/
#
# Replace `yourdomain.com` with your actual domain (or use `_` to match all).
# For HTTPS, run: certbot --nginx -d yourdomain.com

server {
    listen 80;
    listen [::]:80;
    server_name jammy.nathanielc.com;

    # --- Static frontend ---
    root /var/www/jammy;
    index index.html;

    # SPA routing: unknown paths serve index.html so React Router handles them
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- API proxy ---
    location /sessions {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- Uploads (audio files) ---
    location /uploads {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        # Cache audio files aggressively — they are immutable once written
        proxy_cache_valid  200 7d;
        add_header         Cache-Control "public, max-age=604800, immutable";
    }

    # --- Socket.IO (requires WebSocket upgrade) ---
    location /socket.io {
        proxy_pass             http://127.0.0.1:3001;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_set_header       X-Real-IP  $remote_addr;
        proxy_read_timeout     86400s;
        proxy_send_timeout     86400s;
    }

    # --- Compression ---
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml application/wasm;
    gzip_min_length 1024;
}
